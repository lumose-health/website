name: Docs Rebuild

# Triggered by source repos when their docs change.
# Source repos call: gh api repos/GlycemicGPT/website/dispatches -f event_type=docs-updated
on:
  repository_dispatch:
    types: [docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Build (prebuild hook syncs docs from source repos)
        run: npx next build
        env:
          DOCS_NO_CACHE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
