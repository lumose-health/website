name: Docs Rebuild

# Triggered by source repos when their docs change.
# Source repos call: gh api repos/GlycemicGPT/website/dispatches -f event_type=docs-updated
on:
  repository_dispatch:
    types: [docs-updated]

permissions:
  contents: read

concurrency:
  group: "pages-production"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Rebuild docs and deploy to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync docs from source repos
        run: npm run sync-docs && npx fumadocs-mdx
        env:
          DOCS_NO_CACHE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npx next build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=glycemicgpt --branch=main --commit-message="docs rebuild (dispatched by ${{ github.event.client_payload.source }}@${{ github.event.client_payload.sha }})"
