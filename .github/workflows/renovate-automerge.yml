name: Renovate Auto-Merge

# workflow_run always executes the default-branch version of this file, so a
# PR cannot substitute its own steps into a job that can mint the merge-app
# token. Never add a pull_request trigger here: pull_request events run the
# PR-head copy of the workflow with secrets in scope, which would hand the
# ruleset-bypass credential to anyone who can push to a renovate/* branch.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: {}

# Serialize merges so two green PRs can't both merge against the same base and
# leave the second one silently untested against the first (base-moved race).
concurrency:
  group: renovate-auto-merge
  cancel-in-progress: false

# Why a direct merge instead of arming auto-merge: armed auto-merge never
# fires on this repo because the org "Protect main" ruleset requires a
# code-owner review, which the merge app's approval cannot satisfy (apps
# cannot be code owners). The app is a ruleset bypass actor, so this job
# re-enforces main's required status checks itself before merging.
jobs:
  merge-on-green:
    name: Merge on green CI
    runs-on: ubuntu-latest
    # workflow_run.path (not the display name) identifies the real CI
    # workflow: a look-alike workflow named "CI" must not open the gate.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.path == '.github/workflows/ci.yml' &&
      startsWith(github.event.workflow_run.head_branch, 'renovate/')
    permissions: {}

    steps:
      # SHA-pinned (unlike the tag-pinned actions elsewhere in this repo)
      # because this step mints the token for a ruleset-bypass actor: a
      # mutated tag here could exfiltrate a merge-anything credential. The
      # token is scoped to the minimum grants the merge needs.
      - name: Generate token for glycemicgpt-merge
        id: merge-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MERGE_APP_ID }}
          private-key: ${{ secrets.MERGE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Approve and merge Renovate PR at the verified SHA
        env:
          GH_TOKEN: ${{ steps.merge-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          CHECK_SUITE_ID: ${{ github.event.workflow_run.check_suite_id }}
        run: |
          # Every guard below must fail CLOSED: abort on any API error rather
          # than falling through with an empty value.
          set -euo pipefail

          # Resolve the PR by exact head SHA, not just branch name, so a
          # same-named fork branch can never be selected.
          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" --state open \
            --json number,headRefOid | jq -r --arg sha "$HEAD_SHA" \
            '[.[] | select(.headRefOid == $sha)][0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR at $HEAD_BRANCH@$HEAD_SHA; nothing to do"
            exit 0
          fi

          PR_INFO=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
          PR_AUTHOR=$(echo "$PR_INFO" | jq -r '.user.login')
          PR_HEAD=$(echo "$PR_INFO" | jq -r '.head.sha')
          PR_BASE=$(echo "$PR_INFO" | jq -r '.base.ref')
          COMMIT_COUNT=$(echo "$PR_INFO" | jq -r '.commits')

          if [ "$PR_AUTHOR" != "glycemicgpt-renovate[bot]" ]; then
            echo "PR #$PR_NUMBER author is not Renovate ($PR_AUTHOR); skipping"
            exit 0
          fi

          if [ "$PR_BASE" != "main" ]; then
            echo "PR #$PR_NUMBER does not target main ($PR_BASE); skipping"
            exit 0
          fi

          if [ "$PR_HEAD" != "$HEAD_SHA" ]; then
            echo "PR #$PR_NUMBER head moved ($PR_HEAD != $HEAD_SHA); a newer CI run will handle it"
            exit 0
          fi

          # Base-moved race: the required checks ran against this PR's base as
          # it was when CI started. If main has advanced, the merged result was
          # never tested against it. Leave it for Renovate's rebase (which
          # fires a fresh CI run and a fresh attempt here).
          BEHIND_BY=$(gh api "repos/$REPO/compare/main...$HEAD_SHA" --jq '.behind_by')
          if [ "$BEHIND_BY" -ne 0 ]; then
            echo "PR #$PR_NUMBER is $BEHIND_BY commit(s) behind main; awaiting rebase"
            exit 0
          fi

          if [ "$COMMIT_COUNT" -gt 100 ]; then
            echo "::notice::PR #$PR_NUMBER has $COMMIT_COUNT commits; leaving it for human review"
            exit 0
          fi

          # Provenance gate. A bypass merge must never carry attacker content
          # past code-owner review. The author login is derived from the
          # forgeable commit-author email, and GitHub's signature verification
          # attests only to the COMMITTER identity — the two are decoupled, so
          # checking author + verified alone lets a write-access user push a
          # commit whose author is spoofed to Renovate but which is signed by
          # their own key.
          #
          # Genuine Renovate commits are created through the GitHub API, so
          # GitHub itself commits and signs them: committer is web-flow
          # (noreply@github.com) and the signature is GitHub's web-flow key
          # (verified/valid). We therefore require, for every commit: authored
          # by Renovate AND committed by GitHub web-flow AND a valid GitHub
          # signature. An attacker cannot obtain a GitHub-signed commit whose
          # author is spoofed to Renovate: signing with their own key makes the
          # committer/signer themselves (fails the web-flow check), and forging
          # the committer email to noreply@github.com yields an unsigned commit
          # (fails verified). Both paths are rejected.
          BAD_COMMITS=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits?per_page=100" \
            --jq '[.[] | select(
                     ((.author.login // "") != "glycemicgpt-renovate[bot]")
                     or ((.committer.login // "") != "web-flow")
                     or ((.commit.committer.email // "") != "noreply@github.com")
                     or (.commit.verification.verified != true)
                     or (.commit.verification.reason != "valid")
                   )] | length')
          if [ "$BAD_COMMITS" -ne 0 ]; then
            echo "::notice::PR #$PR_NUMBER has commits not verifiably authored by Renovate and signed by GitHub; leaving it for human review"
            exit 0
          fi

          # Re-enforce main's ENTIRE required-check set at HEAD_SHA, read from
          # the live branch rules rather than a hardcoded name — so adding a
          # second required check can't silently leave this sole enforcer
          # gating on only the first. A required context may be satisfied by a
          # check run OR a legacy commit status; require every one to be green.
          REQUIRED=$(gh api "repos/$REPO/rules/branches/main" \
            --jq '[.[] | select(.type == "required_status_checks")
                       | .parameters.required_status_checks[].context] | unique')
          REQUIRED_COUNT=$(echo "$REQUIRED" | jq 'length')
          if [ "$REQUIRED_COUNT" -eq 0 ]; then
            echo "::error::Could not read any required status checks for main; refusing to merge"
            exit 1
          fi

          # Contexts that are green at this SHA: check runs (conclusion ==
          # success) unioned with legacy commit statuses (state == success).
          PASSING=$(
            {
              gh api "repos/$REPO/commits/$HEAD_SHA/check-runs?per_page=100" \
                --jq '.check_runs[] | select(.conclusion == "success") | .name'
              gh api "repos/$REPO/commits/$HEAD_SHA/status" \
                --jq '.statuses[] | select(.state == "success") | .context'
            } | sort -u
          )

          MISSING=$(echo "$REQUIRED" | jq -r --argjson passing \
            "$(printf '%s' "$PASSING" | jq -R . | jq -s .)" \
            'map(select(. as $c | ($passing | index($c)) | not)) | .[]')
          if [ -n "$MISSING" ]; then
            echo "::error::Required checks not green on $HEAD_SHA: $(echo "$MISSING" | paste -sd, -); refusing to merge"
            exit 1
          fi

          # Belt and braces against a same-named check run injected into a
          # different suite: the run we were triggered by (the real CI suite)
          # must itself be entirely green at HEAD_SHA, with no non-success
          # check run lingering in it.
          SUITE_CLEAN=$(gh api "repos/$REPO/check-suites/$CHECK_SUITE_ID/check-runs?per_page=100" \
            --jq --arg sha "$HEAD_SHA" \
            '[.check_runs[]] | (length >= 1)
               and all(.head_sha == $sha and .conclusion == "success")')
          if [ "$SUITE_CLEAN" != "true" ]; then
            echo "::error::Triggering CI suite $CHECK_SUITE_ID is not fully green on $HEAD_SHA; refusing to merge"
            exit 1
          fi

          gh pr review "$PR_NUMBER" --approve --repo "$REPO"

          # Merge via the REST API rather than `gh pr merge`: gh refuses
          # client-side while mergeStateStatus is BLOCKED (the unsatisfiable
          # code-owner review), even though the server honors the app's
          # ruleset bypass. The sha parameter makes the server reject the
          # merge if the head moved after verification.
          gh api -X PUT "repos/$REPO/pulls/$PR_NUMBER/merge" \
            -f merge_method=squash -f sha="$HEAD_SHA"
