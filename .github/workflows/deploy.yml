name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Pages
        # NOTE: do not pass static_site_generator: next here. That option
        # generates a next.config.js (CommonJS) which takes precedence over
        # our next.config.ts and strips out the fumadocs-mdx withMDX wrapper.
        # Our next.config.ts already handles output: "export" + base path.
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Sync docs from source repos
        run: npm run sync-docs && npx fumadocs-mdx
        env:
          DOCS_NO_CACHE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
